set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"
set -g focus-events on

# prefix
set-option -g prefix C-t

# unbind C-b key bindings
unbind-key C-b

# C-t C-t は何もしない（日本語入力切替時の誤爆防止）
unbind C-t

set -s escape-time 1

# Color
set-option -g default-terminal screen-256color
set -g status-interval 10
set -g status-bg colour38
set-window-option -g window-status-current-style bg=white,dim

# pane border
set -g pane-border-style fg=colour244
set -g pane-active-border-style fg=colour39,bold

# Window operation with emacs like key bindings
bind 0 kill-pane
bind 1 break-pane
bind 2 split-window -v -c "#{pane_current_path}"
bind 3 split-window -h -c "#{pane_current_path}"
bind o select-pane -t :.+
bind C-o select-pane -t :.+
bind k kill-window

bind-key c new-window -c "#{pane_current_path}"

set-option -g history-limit 20000 # スクロール可能な行数を20,000行に

# Mouse support
set -g mouse on
unbind-key -T root MouseDown3Pane
bind-key -T root MouseDown3Pane paste-buffer

# Move window by C-t Tab
bind Tab last-window

# Option
set-window-option -g mode-keys emacs
set-window-option -g automatic-rename off

# Bell notification in status bar
set -g visual-bell on
set -g bell-action any
set -g visual-silence on
set -g visual-activity off
set -g window-status-bell-style fg=black,bg=colour226,blink

# Hook: monitor-silence 発火時にアクティブpaneへbell送信
set-hook -g alert-silence "run-shell 'printf \"\\a\" > #{pane_tty}'"

# C-t s で現在のpaneのmonitor-silence(5秒)をトグル
bind s setw monitor-silence 5 \; display-message "Silence monitor: #{?monitor-silence,ON (5s),OFF}"

# Copilot hook: @unread フラグで未読インジケーター表示
setw -g window-status-format '#{?@unread,#[fg=colour196]● #[fg=colour250],#[fg=colour250]  }#I:#W#{window_flags} '
setw -g window-status-current-format '#{?@unread,#[fg=colour196]● #[fg=white],#[fg=white]  }#I:#W#{window_flags} '

# ウィンドウにフォーカスしたら未読フラグを自動クリア
set-hook -g pane-focus-in 'set-option -w -u @unread'
bind-key L pipe-pane "exec cat >> $HOME/tmux-#S-#W-#I.log" \; display-message 'Started logging to tmux-#S-#W-#I.log'
bind-key l pipe-pane \; display-message 'Finish logging to tmux-#S-#W-#I.log'

# ============================================================
#  tmux.conf — tmux 3.6+ / Emacs-style
# ============================================================

# ----- Terminal -----
set -g  default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"
set -g  focus-events on
set -g  extended-keys on
set -g  set-clipboard on            # OSC 52 + tmux バッファ両方に反映
# set -g allow-passthrough on     # Sixel/kitty画像が必要なら有効化

# ----- Prefix -----
set -g prefix C-t
unbind C-b
# IME切替時の誤爆防止: C-t 直後の C-t を無効化
unbind C-t

# ----- General -----
set -s  escape-time 1
set -g  history-limit 50000
set -g  base-index 1
setw -g pane-base-index 1
set -g  renumber-windows on       # ウィンドウ削除時に番号を詰める
set -g  status-interval 10
set -g  mouse on

# ----- Mode -----
setw -g mode-keys emacs
setw -g automatic-rename on

# ----- Window / Pane (Emacs-like) -----
bind 0   kill-pane
bind 1   break-pane
bind 2   split-window -v -c "#{pane_current_path}"
bind 3   split-window -h -c "#{pane_current_path}"
bind o   select-pane -t :.+
bind C-o select-pane -t :.+
bind k   kill-window
bind c   new-window -c "#{pane_current_path}"
bind Tab last-window

# ----- Mouse -----
# 右クリックはターミナルに委譲（コンテキストメニューでコピー可能）
# ペーストは C-t ] で tmux バッファから貼り付け
unbind -T root MouseDown3Pane
# マウスドラッグ選択→コピー (set-clipboard external で OSC 52 経由)
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel

# ----- Popup Picker -----
# C-t w: fzf があればポップアップ、なければ組込み choose-tree
if-shell 'command -v fzf >/dev/null' {
  bind w display-popup -E -w 60% -h 60% \
    "tmux list-windows -a -F '#S:#I  #{window_name}' \
     | fzf --reverse --prompt='window> ' \
     | cut -d' ' -f1 | xargs -r tmux switch-client -t"
} {
  bind w choose-tree -Zw
}

# ----- Bell & Notification -----
set -g visual-bell on
set -g bell-action any
set -g visual-silence on
set -g visual-activity off
set -g window-status-bell-style fg=black,bg=colour226,blink

# Hook: monitor-silence 発火時にアクティブpaneへbell送信
set-hook -g alert-silence "run-shell 'printf \"\\a\" > #{pane_tty}'"

# C-t s: monitor-silence(5秒) トグル
bind s setw monitor-silence 5 \; display-message "Silence monitor: #{?monitor-silence,ON (5s),OFF}"

# ----- @unread indicator (Copilot integration) -----
setw -g window-status-format \
  '#{?@unread,#[fg=colour196]● #[fg=colour250],#[fg=colour250]  }#I:#W#{window_flags} '
setw -g window-status-current-format \
  '#{?@unread,#[fg=colour196]● #[fg=white bold],#[fg=white bold]  }#I:#W#{window_flags} '

set-hook -g pane-focus-in 'set-option -w -u @unread'

# ----- Logging -----
bind L pipe-pane "exec cat >> $HOME/tmux-#S-#W-#I.log" \; display-message 'Started logging to tmux-#S-#W-#I.log'
bind l pipe-pane \; display-message 'Finish logging to tmux-#S-#W-#I.log'

# ----- Status Bar -----
set -g status-style bg=colour236,fg=colour250
set -g status-left-length 30
set -g status-right-length 60
set -g status-left  '#[fg=colour16,bg=colour39,bold] #S #[fg=colour39,bg=colour236] '
set -g status-right '#[fg=colour250] %Y-%m-%d %H:%M '

# ----- Pane Border -----
set -g pane-border-style fg=colour244
set -g pane-active-border-style fg=colour39,bold
set -g pane-border-indicators both

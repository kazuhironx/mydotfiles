"$schema" = 'https://starship.rs/config-schema.json'
add_newline = true

[character]
success_symbol = "[\\$](green bold)"
error_symbol = "[\\$](red bold)"

[directory]
truncation_length = 3

[git_branch]
symbol = ''
format = '\([$symbol$branch(:$remote_branch)]($style)\)'

[git_status]
format = '([$all_status$ahead_behind]($style) )'
conflicted = '='
ahead = '⇡'
behind = '⇣'
diverged = '⇕'
up_to_date = '✓'
untracked = ''
stashed = ''
modified = '🔥'
staged = '+'
renamed = ''
deleted = ''

[package]
disabled = true

[c]
disabled = true

[rust]
disabled = true

[golang]
disabled = true

[python]
disabled = true

[nodejs]
disabled = true

[cmake]
disabled = true

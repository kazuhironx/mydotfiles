# Keep this tracked config stable; Herdr's onboarding would otherwise edit it.
onboarding = false

[terminal]
new_cwd = "follow"

[theme]
# Reuse the terminal palette instead of maintaining duplicate colors here.
name = "dracula"

auto_switch = false
[keys]
prefix = "ctrl+t"

# Preserve the tmux window/pane bindings.
close_pane = "prefix+0"
split_horizontal = "prefix+2"
split_vertical = "prefix+3"
cycle_pane_next = ["prefix+o", "prefix+ctrl+o"]
close_tab = "prefix+k"
new_tab = "prefix+c"
last_pane = ["prefix+t", "prefix+comma"]

# These defaults conflict with tmux's close-tab and logging keys.
focus_pane_up = ""
focus_pane_right = ""
swap_pane_right = ""

# Herdr's navigator is the closest equivalent to the all-window fzf picker.
workspace_picker = ""
goto = "prefix+w"

# Keep direct Meta-number tab switching; Herdr indexes tabs only from 1 to 9.
switch_tab = "alt+1..9"

# Emacs xref-style jump pair: prefix+. jumps to the notification source,
# prefix+, (last_pane above) jumps back.
open_notification_target = "prefix+u"

[[keys.command]]
key = "prefix+1"
type = "shell"
command = '"$HERDR_BIN_PATH" pane move "$HERDR_ACTIVE_PANE_ID" --new-tab --focus'
description = "move pane to a new tab"

[[keys.command]]
key = "prefix+d"
type = "popup"
command = "hunk diff"
description = "run hunk"
width = "90%"
height = "90%"

[ui]
mouse_capture = true
prompt_new_tab_name = false
pane_borders = true
pane_gaps = false
show_agent_labels_on_pane_borders = true
agent_panel_sort = "priority"
accent = "cyan"

[ui.toast]
delivery = "herdr"
delay_seconds = 1

[ui.toast.herdr]
position = "bottom-right"

[ui.sound]
enabled = false

[session]
resume_agents_on_restore = true

[advanced]
# This is the nearest byte-based equivalent to tmux's 50,000-line history.
scrollback_limit_bytes = 10000000
